name: CI Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      # Dummy values for CI — NOT real credentials
      BOT_TOKEN: "123456789:AABBCCDDEEFFaabbccddeeff-1234567890A"
      COOKIE_ENCRYPTION_KEY: "R-0wjmYpzdOMtD3PnPeyTtYg7kPIZjMomIA8eJNHWI8="
      PUBLIC_DOMAIN: "localhost"
      DATA_ROOT: "/tmp/cuhibot_ci_data"
      COOKIES_ROOT: "/tmp/cuhibot_ci_cookies"

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Verify Python compilation
      run: |
        python -m py_compile bot.py server.py sync_ui.py test_bot.py

    - name: Run unit tests
      run: |
        python -m unittest test_bot.py

    - name: Build Docker Image
      run: |
        docker build -t cuhibot:latest .

