<!DOCTYPE html>
<html>
<head>
    <title>Test Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial; padding: 20px; max-width: 500px; margin: 0 auto; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; font-size: 16px; }
        button { background: #0a84ff; color: white; border: none; border-radius: 8px; cursor: pointer; }
        #result { margin-top: 20px; padding: 15px; border-radius: 8px; white-space: pre-wrap; word-break: break-all; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
    </style>
</head>
<body>
    <h2>🧪 Cuhibot Login Test</h2>
    
    <label>Server URL:</label>
    <input type="text" id="url" value="https://www.cuhie.mvp.bd" placeholder="https://your-server.com">
    
    <label>Token:</label>
    <input type="text" id="token" value="cuhi_session_token_xQ3CAxU96bvhQUCE7-3miXal89Bj0wUDjOd8sPloNhQ" placeholder="cuhi_session_token_...">
    
    <button onclick="testLogin()">🚀 Test Login</button>
    
    <div id="result"></div>

    <script>
        async function testLogin() {
            const resultDiv = document.getElementById('result');
            const url = document.getElementById('url').value.trim();
            const token = document.getElementById('token').value.trim();
            
            resultDiv.className = 'info';
            resultDiv.textContent = '⏳ Testing login...\n\n';
            
            // Step 1: Validate inputs
            resultDiv.textContent += 'Step 1: Validating inputs...\n';
            if (!url || !token) {
                resultDiv.className = 'error';
                resultDiv.textContent += '❌ URL or token is empty\n';
                return;
            }
            resultDiv.textContent += `✅ URL: ${url}\n`;
            resultDiv.textContent += `✅ Token: ${token.substring(0, 30)}...\n`;
            resultDiv.textContent += `✅ Token length: ${token.length} chars\n\n`;
            
            // Step 2: Check token format
            resultDiv.textContent += 'Step 2: Checking token format...\n';
            if (token.length < 10) {
                resultDiv.className = 'error';
                resultDiv.textContent += '❌ Token too short (minimum 10 characters)\n';
                return;
            }
            if (token.startsWith('cuhi_session_token_')) {
                resultDiv.textContent += '✅ Token starts with cuhi_session_token_\n\n';
            } else {
                resultDiv.textContent += '⚠️ Token does not start with cuhi_session_token_\n\n';
            }
            
            // Step 3: Prepare request
            resultDiv.textContent += 'Step 3: Preparing request...\n';
            const normalizedUrl = url.replace(/\/$/, '');
            const headers = { 'Content-Type': 'application/json' };
            
            if (token.startsWith("Bearer ") || (token.length > 30 && !token.includes(":") && !token.includes("hash="))) {
                headers['Authorization'] = token.startsWith("Bearer ") ? token : `Bearer ${token}`;
                resultDiv.textContent += '✅ Using Authorization header\n\n';
            } else {
                headers['X-Init-Data'] = token;
                resultDiv.textContent += '✅ Using X-Init-Data header\n\n';
            }
            
            // Step 4: Send request
            resultDiv.textContent += 'Step 4: Sending request...\n';
            resultDiv.textContent += `URL: ${normalizedUrl}/api/stats\n`;
            
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 15000);
                
                const res = await fetch(`${normalizedUrl}/api/stats`, {
                    method: 'GET',
                    headers: headers,
                    signal: controller.signal
                });
                
                clearTimeout(timeoutId);
                
                resultDiv.textContent += `Status: ${res.status} ${res.statusText}\n\n`;
                
                // Step 5: Parse response
                resultDiv.textContent += 'Step 5: Parsing response...\n';
                
                if (!res.ok) {
                    const err = await res.json().catch(() => ({detail: `Error ${res.status}`}));
                    resultDiv.className = 'error';
                    resultDiv.textContent += `❌ Login failed: ${err.detail || res.statusText}\n`;
                    return;
                }
                
                const stats = await res.json();
                resultDiv.className = 'success';
                resultDiv.textContent += '✅ LOGIN SUCCESSFUL!\n\n';
                resultDiv.textContent += 'User Stats:\n';
                resultDiv.textContent += JSON.stringify(stats, null, 2);
                
            } catch (err) {
                resultDiv.className = 'error';
                if (err.name === 'AbortError') {
                    resultDiv.textContent += '❌ Request timeout (15 seconds)\n';
                    resultDiv.textContent += 'Server is not responding\n';
                } else if (err.message.includes('Failed to fetch')) {
                    resultDiv.textContent += '❌ Network error\n';
                    resultDiv.textContent += 'Cannot reach server\n';
                    resultDiv.textContent += 'Check URL and internet connection\n';
                } else {
                    resultDiv.textContent += `❌ Error: ${err.message}\n`;
                }
            }
        }
    </script>
</body>
</html>
